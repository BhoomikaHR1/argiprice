version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────
  db:
    image: postgres:16-alpine
    container_name: agriprice_db
    environment:
      POSTGRES_DB:       agriprice
      POSTGRES_USER:     agriprice
      POSTGRES_PASSWORD: agriprice_dev_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agriprice"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (caching) ──────────────────────
  redis:
    image: redis:7-alpine
    container_name: agriprice_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ─── FastAPI Backend ──────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agriprice_backend
    environment:
      DATABASE_URL:      postgresql+asyncpg://agriprice:agriprice_dev_2024@db:5432/agriprice
      DATABASE_URL_SYNC: postgresql://agriprice:agriprice_dev_2024@db:5432/agriprice
      SECRET_KEY:        dev-secret-key-change-in-production
      REDIS_URL:         redis://redis:6379
      APP_ENV:           development
      DEBUG:             "true"
      ALLOWED_ORIGINS:   '["http://localhost:3000","http://localhost:5173"]'
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml:/ml
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ─── React Frontend ───────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: agriprice_frontend
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  postgres_data:
  redis_data:
